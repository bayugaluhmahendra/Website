<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Player V8</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Loading -->
<div id="loading">
    <div class="loader">
        <h1>???</h1>

        <div class="progress">
            <div class="bar"></div>
        </div>

        <span id="percent">0%</span>
    </div>
</div>

<!-- Start Screen -->
<div id="start">
    <div class="logo">
        <h1></h1>
        <p>Tap Anywhere</p>
    </div>
</div>

<!-- Video -->
<video
id="video"
preload="auto"
playsinline
webkit-playsinline
loop>

<source src="video.mp4" type="video/mp4">

</video>

<!-- Top Fade -->
<div class="top-gradient"></div>

<!-- Bottom Fade -->
<div class="bottom-gradient"></div>

<!-- Particle -->
<div id="particles"></div>

<!-- Control -->
<div id="controls">

<button id="playBtn">▶</button>

<div id="seek">

<div id="seekBar"></div>

</div>

<span id="time">
00:00 / 00:00
</span>

<button id="fullscreen">

⛶

</button>

</div>

<script src="script.js"></script>

</body>
</html>
