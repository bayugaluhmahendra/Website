<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Player V7</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Loading -->
<div id="loading">
    <h1>ANIME EDIT</h1>

    <div class="progress">
        <div class="bar"></div>
    </div>

    <p id="percent">0%</p>
</div>

<!-- Tap Anywhere -->
<div id="start">
    <h1>ANIME EDIT</h1>
    <p>Tap Anywhere</p>
</div>

<!-- Video -->
<video
id="video"
playsinline
webkit-playsinline
preload="auto"
loop>

<source src="video.mp4" type="video/mp4">

</video>

<div id="overlay"></div>

<div id="particles"></div>

<script src="script.js"></script>

</body>
    </html>
